##############################################
# Tipos de Evento
##############################################

type Evento {
  id: Int!
  nombre: String!
  fecha: Date!
  lugar: String!
  costo: Int!
  tipo: TipoEvento!
  descuentoEstudiante: Int!
  descuentoProfesor: Int!
  vigencia: VigenciaEvento!
  usuarioId: Int!
  usuario: Usuario
  ponenteEvento: [PonenteEvento]
  suscripcionEvento: [SuscripcionEvento]
}

type PonenteEvento {
  id: Int!
  usuarioId: Int!
  eventoId: Int!
  usuario: Usuario
  evento: Evento
  isActivo: Boolean!
}

type SuscripcionEvento {
  id: Int!
  precioAlSuscripcion: Int!
  estatus: EstatusPagoEvento!
  comprobante: String!
  comprobanteImg: String!
  eventoId: Int!
  evento: Evento
  usuarioId: Int!
  usuario: Usuario
  createdAt: Date!
  updatedAt: Date!
}

##############################################
# Responses de Evento
##############################################

type EventoResponse {
  type: String
  message: String
  data: Evento
}

type EventosResponse {
  type: String
  message: String
  data: [Evento]
  meta: Meta
}

type SuscripcionesEventoResponse {
  type: String
  message: String
  data: [SuscripcionEvento]
  meta: Meta
}

type EventosActivosResponse {
  type: String
  message: String
  data: EventosActivosData
}

type EventosActivosData {
  eventos: [Evento]
  suscripcionesEventoUsuario: [SuscripcionEvento]
}

##############################################
# Extensiones de Query y Mutation
##############################################

extend type Query {
  getEventos(
    token: String!
    page: Int
    pageSize: Int
    filtro: String
    vigencia: VigenciaEvento
    tipo: TipoEvento
  ): EventosResponse!

  getEventosActivos(token: String!): EventosActivosResponse!

  getSuscripcionesEvento(
    token: String!
    page: Int
    pageSize: Int
    filtro: String
    eventoId: Int
    estatus: EstatusPagoEvento
  ): SuscripcionesEventoResponse!
}

input PonenteInput {
  id: Int!
  isActivo: Boolean!
}

type SuscripcionEventoResponse {
  type: String
  message: String
  data: SuscripcionEvento
}

extend type Mutation {
  crearEvento(
    token: String!
    nombre: String!
    fecha: Date!
    lugar: String!
    costo: Int!
    tipo: TipoEvento!
    descuentoEstudiante: Int
    descuentoProfesor: Int
    vigencia: VigenciaEvento
    ponentes: [PonenteInput!]
  ): EventoResponse!

  actualizarEvento(
    token: String!
    eventoId: Int!
    nombre: String
    fecha: Date
    lugar: String
    costo: Int
    tipo: TipoEvento
    descuentoEstudiante: Int
    descuentoProfesor: Int
    vigencia: VigenciaEvento
    ponentes: [PonenteInput!]
  ): EventoResponse!

  actualizarSuscripcionEventoEstatus(
    token: String!
    suscripcionEventoId: Int!
    estatus: EstatusPagoEvento!
  ): SuscripcionEventoResponse!

  suscribirseEvento(
    token: String!
    eventoId: Int!
    comprobante: String!
    comprobanteImg: String!
  ): SuscripcionEventoResponse!
}
