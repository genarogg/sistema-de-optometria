##############################################
# Tipos de Documentos
##############################################

type DocumentoResponse {
  type: String!
  message: String!
  data: String
}

extend type Query {
  getCarnetSolvencia(
    token: String!
    tipoDeDocumento: TipoDeDocumento!
    suscripcionId: Int
  ): DocumentoResponse!

  getCarnetEvento(
    token: String!
    usuarioId: Int!
    eventoId: Int!
  ): DocumentoResponse!
  
  getCertificado(
    token: String!
    usuarioId: Int
    eventoId: Int!
  ): DocumentoResponse!

  validacionDocumento(
    id: Int!
  ): DocumentoResponse!
}
