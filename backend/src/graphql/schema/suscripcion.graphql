##############################################
# Tipos de Suscripción
##############################################

type PlanSuscripcion {
  id: Int!
  costo: Int!
  tipo: TipoSuscripcion!
  isActivo: Boolean!
  usuario: Usuario
  suscripciones: [Suscripcion]
}

type Suscripcion {
  id: Int!
  estatus: EstatusSuscripcion!
  comprobante: Int!
  comprobanteImg: String!
  contodesuscripcion: Int!
  usuario: Usuario
  suscripcionId: Int!
  planSuscripcion: PlanSuscripcion
  isActivo: Boolean!
}

type PlanSuscripcionResponse {
  type: String
  message: String
  data: PlanSuscripcion
}

type PlanSuscripcionesResponse {
  type: String
  message: String
  data: [PlanSuscripcion]
}

type SuscripcionResponse {
  type: String
  message: String
  data: Suscripcion
}

type SuscripcionesResponse {
  type: String
  message: String
  data: [Suscripcion]
}

extend type Query {
  getPlanes(token: String!): PlanSuscripcionesResponse!
  getSuscripciones(token: String!, filtro: String): SuscripcionesResponse!
}

extend type Mutation {
  crearPlan(
    token: String!

    costo: Int!
    tipo: TipoSuscripcion!
  ): PlanSuscripcionResponse!

  updatePlan(
    token: String!
    planId: Int!
    costo: Int
    tipo: TipoSuscripcion
    isActivo: Boolean
  ): PlanSuscripcionResponse!

  crearSuscripcion(
    token: String!
    planId: Int!
    comprobante: Int!
    comprobanteImg: String!
    isActivo: Boolean
  ): SuscripcionResponse!
  updateSuscripcionEstatus(
    token: String!
    suscripcionId: Int!
    estatus: EstatusSuscripcion!
  ): SuscripcionResponse!
}
